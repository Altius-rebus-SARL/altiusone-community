services:
  # Base de données PostgreSQL avec PostGIS et pgvector
  altiusone_postgres:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    image: altiusone-postgres
    platform: linux/amd64
    container_name: altiusone_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-altiusone}
      POSTGRES_USER: ${POSTGRES_USER:-altiusone}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-extensions.sql:/docker-entrypoint-initdb.d/init-extensions.sql
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-altiusone} -d ${POSTGRES_DB:-altiusone}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - altiusone_network

  # Redis pour le cache et Celery
  redis:
    image: redis:7-alpine
    platform: linux/amd64
    container_name: altiusone_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - altiusone_network

  # Backend Django
  django:
    build:
      context: .
      dockerfile: Dockerfile
    image: altiusone-django
    platform: linux/amd64
    container_name: altiusone_django
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DB_HOST=altiusone_postgres
      - DATABASE_URL=postgresql://${POSTGRES_USER:-altiusone}:${POSTGRES_PASSWORD}@altiusone_postgres:5432/${POSTGRES_DB:-altiusone}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      # MinIO/S3 Storage
      - USE_S3=${USE_S3:-true}
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER:-minio}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      - AWS_STORAGE_BUCKET_NAME=${AWS_STORAGE_BUCKET_NAME:-altiusone-media}
      - AWS_S3_ENDPOINT_URL=http://minio:9000
      - AWS_S3_REGION_NAME=us-east-1
      - DJANGO_SETTINGS_MODULE=AltiusOne.settings_community
    command: /app/entrypoint.sh
    volumes:
      - media:/app/media
      - static:/app/staticfiles
      - logs:/app/logs
    ports:
      - "${DJANGO_PORT:-8011}:8000"
    depends_on:
      altiusone_postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - altiusone_network

  # Celery Worker
  celery:
    image: altiusone-django
    pull_policy: never
    platform: linux/amd64
    container_name: altiusone_celery
    restart: unless-stopped
    entrypoint: []
    command: celery -A AltiusOne worker --loglevel=info --concurrency=4
    env_file:
      - .env
    environment:
      - DB_HOST=altiusone_postgres
      - DATABASE_URL=postgresql://${POSTGRES_USER:-altiusone}:${POSTGRES_PASSWORD}@altiusone_postgres:5432/${POSTGRES_DB:-altiusone}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      # MinIO/S3 Storage
      - USE_S3=${USE_S3:-true}
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER:-minio}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      - AWS_STORAGE_BUCKET_NAME=${AWS_STORAGE_BUCKET_NAME:-altiusone-media}
      - AWS_S3_ENDPOINT_URL=http://minio:9000
      - AWS_S3_REGION_NAME=us-east-1
      - DJANGO_SETTINGS_MODULE=AltiusOne.settings_community
    volumes:
      - media:/app/media
      - logs:/app/logs
    depends_on:
      altiusone_postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      django:
        condition: service_started
    networks:
      - altiusone_network

  # Celery Beat (pour les tâches planifiées)
  celery-beat:
    image: altiusone-django
    pull_policy: never
    platform: linux/amd64
    container_name: altiusone_celery_beat
    restart: unless-stopped
    entrypoint: []
    command: celery -A AltiusOne beat --loglevel=info
    env_file:
      - .env
    environment:
      - DB_HOST=altiusone_postgres
      - DATABASE_URL=postgresql://${POSTGRES_USER:-altiusone}:${POSTGRES_PASSWORD}@altiusone_postgres:5432/${POSTGRES_DB:-altiusone}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      # MinIO/S3 Storage
      - USE_S3=${USE_S3:-true}
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER:-minio}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      - AWS_STORAGE_BUCKET_NAME=${AWS_STORAGE_BUCKET_NAME:-altiusone-media}
      - AWS_S3_ENDPOINT_URL=http://minio:9000
      - AWS_S3_REGION_NAME=us-east-1
      - DJANGO_SETTINGS_MODULE=AltiusOne.settings_community
    volumes:
      - logs:/app/logs
    depends_on:
      altiusone_postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      django:
        condition: service_started
    networks:
      - altiusone_network

  # Nginx comme reverse proxy
  nginx:
    image: nginx:alpine
    platform: linux/amd64
    container_name: altiusone_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-8080}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - static:/app/staticfiles:ro
      - media:/app/media:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - django
    networks:
      - altiusone_network

  # ===========================================================================
  # MinIO - Stockage S3 compatible
  # ===========================================================================
  minio:
    image: minio/minio:latest
    container_name: altiusone_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in .env}
      MINIO_DOMAIN: minio
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      altiusone_network:
        aliases:
          - minio

  # Initialisation des buckets MinIO
  minio-init:
    image: minio/mc:latest
    container_name: altiusone_minio_init
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      AWS_STORAGE_BUCKET_NAME: ${AWS_STORAGE_BUCKET_NAME:-altiusone-media}
    volumes:
      - ./docker/minio/init-buckets.sh:/init-buckets.sh:ro
    entrypoint: ["/bin/sh", "/init-buckets.sh"]
    networks:
      - altiusone_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  media:
    driver: local
  static:
    driver: local
  logs:
    driver: local
  minio_data:
    driver: local

networks:
  altiusone_network:
    driver: bridge
