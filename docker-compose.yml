services:
  # Base de données PostgreSQL avec PostGIS et pgvector
  altiusone_postgres:
    image: ghcr.io/altius-rebus-sarl/altiusone-postgres:${ALTIUSONE_IMAGE_TAG:-latest}
    platform: linux/amd64
    container_name: altiusone_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-altiusone}
      POSTGRES_USER: ${POSTGRES_USER:-altiusone}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-altiusone} -d ${POSTGRES_DB:-altiusone}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - altiusone_network

  # Redis pour le cache et Celery
  redis:
    image: redis:7-alpine
    platform: linux/amd64
    container_name: altiusone_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - altiusone_network

  # Backend Django
  django:
    image: ghcr.io/altius-rebus-sarl/altiusone-django:${ALTIUSONE_IMAGE_TAG:-latest}
    platform: linux/amd64
    container_name: altiusone_django
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DB_HOST=altiusone_postgres
      - DATABASE_URL=postgresql://${POSTGRES_USER:-altiusone}:${POSTGRES_PASSWORD}@altiusone_postgres:5432/${POSTGRES_DB:-altiusone}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      # MinIO/S3 Storage
      - USE_S3=${USE_S3:-true}
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER:-minio}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      - AWS_STORAGE_BUCKET_NAME=${AWS_STORAGE_BUCKET_NAME:-altiusone-media}
      - AWS_S3_ENDPOINT_URL=http://minio:9000
      - AWS_S3_REGION_NAME=us-east-1
      # Chat LLM local (transformers direct, pas d'Ollama)
      - CHAT_MODEL_NAME=${CHAT_MODEL_NAME:-Qwen/Qwen2.5-0.5B-Instruct}
    command: /app/entrypoint.sh
    volumes:
      - media:/app/media
      - static:/app/staticfiles
      - logs:/app/logs
      - ./oidc_rsa_key.pem:/app/oidc_rsa_key.pem:ro
      - ./firebase-credentials.json:/app/firebase-credentials.json:ro
      - ./apns-auth-key.p8:/app/apns-auth-key.p8:ro
    ports:
      - "${DJANGO_PORT:-8011}:8000"
    depends_on:
      altiusone_postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - altiusone_network

  # Celery Worker
  celery:
    image: ghcr.io/altius-rebus-sarl/altiusone-django:${ALTIUSONE_IMAGE_TAG:-latest}
    platform: linux/amd64
    container_name: altiusone_celery
    restart: unless-stopped
    entrypoint: []
    command: celery -A AltiusOne worker --loglevel=info --concurrency=4
    env_file:
      - .env
    environment:
      - DB_HOST=altiusone_postgres
      - DATABASE_URL=postgresql://${POSTGRES_USER:-altiusone}:${POSTGRES_PASSWORD}@altiusone_postgres:5432/${POSTGRES_DB:-altiusone}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      # MinIO/S3 Storage
      - USE_S3=${USE_S3:-true}
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER:-minio}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      - AWS_STORAGE_BUCKET_NAME=${AWS_STORAGE_BUCKET_NAME:-altiusone-media}
      - AWS_S3_ENDPOINT_URL=http://minio:9000
      - AWS_S3_REGION_NAME=us-east-1
      # Chat LLM local (transformers direct, pas d'Ollama)
      - CHAT_MODEL_NAME=${CHAT_MODEL_NAME:-Qwen/Qwen2.5-0.5B-Instruct}
    volumes:
      - media:/app/media
      - logs:/app/logs
      - ./oidc_rsa_key.pem:/app/oidc_rsa_key.pem:ro
      - ./firebase-credentials.json:/app/firebase-credentials.json:ro
      - ./apns-auth-key.p8:/app/apns-auth-key.p8:ro
    depends_on:
      altiusone_postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      django:
        condition: service_started
    networks:
      - altiusone_network

  # Celery Beat (pour les tâches planifiées)
  celery-beat:
    image: ghcr.io/altius-rebus-sarl/altiusone-django:${ALTIUSONE_IMAGE_TAG:-latest}
    platform: linux/amd64
    container_name: altiusone_celery_beat
    restart: unless-stopped
    entrypoint: []
    command: celery -A AltiusOne beat --loglevel=info
    env_file:
      - .env
    environment:
      - DB_HOST=altiusone_postgres
      - DATABASE_URL=postgresql://${POSTGRES_USER:-altiusone}:${POSTGRES_PASSWORD}@altiusone_postgres:5432/${POSTGRES_DB:-altiusone}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      # MinIO/S3 Storage
      - USE_S3=${USE_S3:-true}
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER:-minio}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      - AWS_STORAGE_BUCKET_NAME=${AWS_STORAGE_BUCKET_NAME:-altiusone-media}
      - AWS_S3_ENDPOINT_URL=http://minio:9000
      - AWS_S3_REGION_NAME=us-east-1
      - DJANGO_SETTINGS_MODULE=AltiusOne.settings_community
    volumes:
      - logs:/app/logs
      - ./oidc_rsa_key.pem:/app/oidc_rsa_key.pem:ro
      - ./firebase-credentials.json:/app/firebase-credentials.json:ro
      - ./apns-auth-key.p8:/app/apns-auth-key.p8:ro
    depends_on:
      altiusone_postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      django:
        condition: service_started
    networks:
      - altiusone_network

  # Nginx comme reverse proxy
  nginx:
    image: nginx:alpine
    platform: linux/amd64
    container_name: altiusone_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-8080}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - static:/app/staticfiles:ro
      - media:/app/media:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - django
    networks:
      - altiusone_network

  # ===========================================================================
  # MinIO - Stockage S3 compatible
  # ===========================================================================
  minio:
    image: minio/minio:latest
    container_name: altiusone_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in .env}
      MINIO_DOMAIN: minio
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      altiusone_network:
        aliases:
          - minio

  # Initialisation des buckets MinIO
  minio-init:
    image: minio/mc:latest
    container_name: altiusone_minio_init
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      AWS_STORAGE_BUCKET_NAME: ${AWS_STORAGE_BUCKET_NAME:-altiusone-media}
    volumes:
      - ./docker/minio/init-buckets.sh:/init-buckets.sh:ro
    entrypoint: ["/bin/sh", "/init-buckets.sh"]
    networks:
      - altiusone_network

  # ===========================================================================
  # Nextcloud - Collaboration et stockage de fichiers
  # ===========================================================================
  altiusone_nextcloud_db:
    image: postgres:17-alpine
    container_name: altiusone_nextcloud_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: nextcloud
      POSTGRES_USER: nextcloud_user
      POSTGRES_PASSWORD: ${NEXTCLOUD_DB_PASSWORD:-NextCloud@2026}
    volumes:
      - nextcloud_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nextcloud_user -d nextcloud"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - altiusone_network

  altiusone_nextcloud:
    image: ghcr.io/altius-rebus-sarl/altiusone-nextcloud:${ALTIUSONE_IMAGE_TAG:-latest}
    container_name: altiusone_nextcloud
    restart: unless-stopped
    depends_on:
      altiusone_nextcloud_db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      # PostgreSQL
      POSTGRES_HOST: altiusone_nextcloud_db
      POSTGRES_DB: nextcloud
      POSTGRES_USER: nextcloud_user
      POSTGRES_PASSWORD: ${NEXTCLOUD_DB_PASSWORD:-NextCloud@2026}
      # Redis (reuses AltiusOne Redis, database 1)
      REDIS_HOST: redis
      # MinIO S3 Storage
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minio}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minio123}
      MINIO_BUCKET: ${AWS_STORAGE_BUCKET_NAME:-altiusone-media}
      # OIDC SSO with AltiusOne (URL externe, pas http://django:8000
      # car Nextcloud bloque les adresses locales - protection SSRF)
      OIDC_PROVIDER_URL: https://${DOMAIN:-localhost}
      OIDC_CLIENT_ID: ${NEXTCLOUD_OIDC_CLIENT_ID:-nextcloud}
      OIDC_CLIENT_SECRET: ${NEXTCLOUD_OIDC_CLIENT_SECRET:-nextcloud-secret-change-me}
      # Nextcloud Admin
      NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_ADMIN_USER:-admin}
      NEXTCLOUD_ADMIN_PASSWORD: ${NEXTCLOUD_ADMIN_PASSWORD:-admin123}
      NEXTCLOUD_TRUSTED_DOMAINS: ${NEXTCLOUD_TRUSTED_DOMAINS:-localhost nextcloud.localhost}
      # Reverse proxy settings
      OVERWRITEPROTOCOL: https
      OVERWRITEHOST: ${NEXTCLOUD_DOMAIN:-nextcloud.localhost}
      # OnlyOffice
      ONLYOFFICE_JWT_SECRET: ${ONLYOFFICE_JWT_SECRET:-onlyoffice-jwt-secret}
      ONLYOFFICE_PUBLIC_URL: ${ONLYOFFICE_PUBLIC_URL:-http://localhost:9980/}
    volumes:
      - nextcloud_data:/var/www/html
      - nextcloud_config:/var/www/html/config
      - nextcloud_apps:/var/www/html/custom_apps
    ports:
      - "${NEXTCLOUD_PORT:-8585}:80"
    networks:
      - altiusone_network

  # ===========================================================================
  # OnlyOffice Document Server
  # ===========================================================================
  altiusone_onlyoffice:
    image: onlyoffice/documentserver:latest
    container_name: altiusone_onlyoffice
    restart: unless-stopped
    environment:
      JWT_ENABLED: "true"
      JWT_SECRET: ${ONLYOFFICE_JWT_SECRET:-onlyoffice-jwt-secret}
    volumes:
      - onlyoffice_data:/var/www/onlyoffice/Data
      - onlyoffice_logs:/var/log/onlyoffice
    ports:
      - "${ONLYOFFICE_PORT:-9980}:80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - altiusone_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  media:
    driver: local
  static:
    driver: local
  logs:
    driver: local
  minio_data:
    driver: local

networks:
  altiusone_network:
    driver: bridge
