upstream django_backend {
    server django:8000;
}

# Docs (La Suite Numérique) - Éditeur collaboratif
upstream docs_backend {
    server docs-api:8000;
}

upstream docs_frontend {
    server docs-frontend:8080;
}

upstream docs_yprovider {
    server docs-yprovider:4444;
}

upstream docs_minio {
    server minio:9000;
}

server {
    listen 80;
    server_name localhost;

    # Limite de taille des uploads
    client_max_body_size 100M;

    # Logs
    access_log /var/log/nginx/altiusone_access.log;
    error_log /var/log/nginx/altiusone_error.log;

    # Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Sécurité
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Fichiers statiques Django
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Fichiers media Django
    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Health check pour Django
    location /health/ {
        proxy_pass http://django_backend;
        access_log off;
    }

    # WebSocket pour Django Channels (si utilisé)
    location /ws/ {
        proxy_pass http://django_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # Toutes les autres routes vers Django
    location / {
        proxy_pass http://django_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;

        # Timeout pour les requêtes longues
        proxy_connect_timeout 600;
        proxy_send_timeout 600;
        proxy_read_timeout 600;
        send_timeout 600;
    }

    # =========================================================================
    # Docs (La Suite Numérique) - Éditeur collaboratif
    # Routes sous /docs/*
    # =========================================================================

    # Docs Frontend (Next.js)
    location /docs/ {
        proxy_pass http://docs_frontend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Docs API (Django REST Framework)
    location /docs/api/ {
        proxy_pass http://docs_backend/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Force HTTPS pour éviter les redirections 301
        proxy_set_header X-Forwarded-Proto https;
    }

    # Docs Admin
    location /docs/admin/ {
        proxy_pass http://docs_backend/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Docs Static files
    location /docs/static/ {
        proxy_pass http://docs_backend/static/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Docs WebSocket (Y-Provider pour collaboration temps réel)
    location /docs/ws/ {
        proxy_pass http://docs_yprovider/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # Docs collaboration API
    location /docs/collaboration/ {
        proxy_pass http://docs_yprovider/collaboration/;
        proxy_set_header Host $host;
    }

    # Docs Storage (MinIO)
    location /docs/storage/ {
        proxy_pass http://docs_minio/altiusone-docs/;
        proxy_set_header Host $host;
    }
}
