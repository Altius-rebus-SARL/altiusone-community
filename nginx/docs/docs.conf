upstream docs_backend {
    server docs-api:8000 fail_timeout=0;
}

upstream docs_frontend {
    server docs-frontend:8080 fail_timeout=0;
}

upstream docs_yprovider {
    server docs-yprovider:4444 fail_timeout=0;
}

server {
    listen 80;
    server_name localhost;
    charset utf-8;

    # increase max upload size
    client_max_body_size 10m;

    # Disables server version feedback on pages and in headers
    server_tokens off;

    location @proxy_to_docs_backend {
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # X-Forwarded-Proto dynamique - sera https en prod via le reverse proxy principal
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_redirect off;
        proxy_pass http://docs_backend;
    }

    location @proxy_to_docs_frontend {
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_redirect off;
        proxy_pass http://docs_frontend;
    }

    location / {
        try_files $uri @proxy_to_docs_frontend;
    }

    location /api/ {
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_pass http://docs_backend;
    }

    location /admin/ {
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_pass http://docs_backend;
    }

    location /static/ {
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_pass http://docs_backend;
    }

    # Proxy for collaboration WebSocket
    location /collaboration/ws/ {
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";

        proxy_pass http://docs_yprovider;

        proxy_read_timeout 86400;
        proxy_send_timeout 86400;

        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Origin $http_origin;
        proxy_set_header Host $host;
    }

    location /collaboration/api/ {
        proxy_pass http://docs_yprovider;
        proxy_set_header Host $host;
    }

    # Proxy for media via Minio
    location /media/ {
        proxy_pass http://minio:9000/altiusone-docs/;
        proxy_set_header Host minio:9000;
    }
}
