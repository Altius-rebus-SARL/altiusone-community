# =============================================================================
# Docker Compose - Docs (La Suite Numérique) - PRODUCTION
# =============================================================================
# Éditeur collaboratif temps réel - Projet Franco-Allemand
# À utiliser avec: docker compose -f docker-compose.yml -f docker-compose.docs.yml up
#
# IMPORTANT: Cette version utilise des images PRÉ-CONSTRUITES depuis le registry.
# Pour builder les images, utilisez docker-compose.docs.build.yml
#
# NOTE: Docs utilise sa propre base de données (altiusone_docs) pour éviter
# les conflits de migrations avec AltiusOne (les deux ont une app 'core').
#
# Source: https://github.com/suitenumerique/docs
# =============================================================================

services:
  # ===========================================================================
  # PostgreSQL pour Docs (base de données dédiée)
  # ===========================================================================
  # Docs a besoin de sa propre DB car son app 'core' entre en conflit avec
  # l'app 'core' d'AltiusOne (migrations incompatibles)
  docs-postgres:
    image: postgres:16-alpine
    container_name: altiusone_docs_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DOCS_POSTGRES_DB:-altiusone_docs}
      POSTGRES_USER: ${DOCS_POSTGRES_USER:-docs}
      POSTGRES_PASSWORD: ${DOCS_POSTGRES_PASSWORD:-docs-secret-change-me}
    volumes:
      - docs_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DOCS_POSTGRES_USER:-docs} -d ${DOCS_POSTGRES_DB:-altiusone_docs}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - altiusone_network
  # ===========================================================================
  # Minio - Stockage S3 compatible (souverain)
  # ===========================================================================
  minio:
    image: minio/minio:latest
    container_name: altiusone_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123}
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - altiusone_network

  # Initialisation des buckets Minio
  minio-init:
    image: minio/mc:latest
    container_name: altiusone_minio_init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set myminio http://minio:9000 $${MINIO_ROOT_USER:-minio} $${MINIO_ROOT_PASSWORD:-minio123};
      mc mb --ignore-existing myminio/altiusone-docs;
      mc anonymous set download myminio/altiusone-docs/public;
      echo 'Buckets créés avec succès';
      exit 0;
      "
    networks:
      - altiusone_network

  # ===========================================================================
  # Docs Backend (Django REST Framework) - Image pré-construite
  # ===========================================================================
  docs-api:
    image: lasuite/impress-backend:latest
    container_name: altiusone_docs_api
    restart: unless-stopped
    user: "1000"
    environment:
      # Base de données dédiée pour Docs (évite les conflits avec AltiusOne)
      DB_HOST: docs-postgres
      DB_PORT: 5432
      DB_NAME: ${DOCS_POSTGRES_DB:-altiusone_docs}
      DB_USER: ${DOCS_POSTGRES_USER:-docs}
      DB_PASSWORD: ${DOCS_POSTGRES_PASSWORD:-docs-secret-change-me}

      # Cache Redis
      REDIS_URL: redis://redis:6379/1

      # Stockage S3/Minio
      AWS_S3_ENDPOINT_URL: http://minio:9000
      AWS_S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minio}
      AWS_S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minio123}
      AWS_STORAGE_BUCKET_NAME: altiusone-docs
      AWS_S3_REGION_NAME: us-east-1

      # Application - Utilise notre settings_override.py pour désactiver SSL
      DJANGO_SECRET_KEY: ${DOCS_SECRET_KEY:-docs-secret-change-me-in-production}
      DJANGO_ALLOWED_HOSTS: "*"
      DJANGO_DEBUG: "True"
      DJANGO_SETTINGS_MODULE: settings_override
      DJANGO_CONFIGURATION: AltiusOneProduction
      DJANGO_CSRF_TRUSTED_ORIGINS: "http://localhost:3000,http://localhost:8072,http://127.0.0.1:3000"

      # OIDC Configuration - Utilise AltiusOne comme provider
      # AltiusOne expose les endpoints OIDC via django-oauth-toolkit
      OIDC_OP_JWKS_ENDPOINT: http://django:8000/o/.well-known/jwks.json
      OIDC_OP_AUTHORIZATION_ENDPOINT: http://localhost:8012/o/authorize/
      OIDC_OP_TOKEN_ENDPOINT: http://django:8000/o/token/
      OIDC_OP_USER_ENDPOINT: http://django:8000/o/userinfo/
      OIDC_RP_CLIENT_ID: ${DOCS_OIDC_CLIENT_ID:-docs}
      OIDC_RP_CLIENT_SECRET: ${DOCS_OIDC_CLIENT_SECRET:-docs-secret-change-me}
      OIDC_RP_SIGN_ALGO: RS256
      OIDC_RP_SCOPES: "openid email profile"
      LOGIN_REDIRECT_URL: http://localhost:3000
      LOGIN_REDIRECT_URL_FAILURE: http://localhost:3000
      LOGOUT_REDIRECT_URL: http://localhost:3000

      # Y-Provider WebSocket
      Y_PROVIDER_URL: ws://docs-yprovider:4444

      # Intégration AltiusOne (webhook)
      COLLABORATION_WEBHOOK_URL: http://django:8000/editeur/webhook/docs/
    volumes:
      - docs_media:/app/media
      # Settings override pour désactiver SSL (géré par notre Nginx)
      - ./nginx/docs/settings_override.py:/app/settings_override.py:ro
      - ./nginx/docs/wsgi_override.py:/app/wsgi_override.py:ro
    # Utiliser notre wsgi custom au lieu de impress.wsgi
    command: gunicorn -c /usr/local/etc/gunicorn/impress.py wsgi_override:application
    ports:
      - "${DOCS_API_PORT:-8072}:8000"
    depends_on:
      docs-postgres:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - altiusone_network

  # ===========================================================================
  # Docs Frontend (Next.js via Nginx) - Image officielle La Suite Numérique
  # ===========================================================================
  docs-frontend:
    image: lasuite/impress-frontend:latest
    container_name: altiusone_docs_frontend
    restart: unless-stopped
    user: "1000"
    environment:
      # URL vide = utilise le même hôte (relatif), le proxy Nginx route /api/ vers le backend
      NEXT_PUBLIC_API_ORIGIN: ""
    depends_on:
      - docs-api
    networks:
      - altiusone_network

  # ===========================================================================
  # Docs Nginx Proxy - Route frontend/backend/websocket
  # ===========================================================================
  docs-nginx:
    image: nginx:alpine
    container_name: altiusone_docs_nginx
    restart: unless-stopped
    ports:
      - "${DOCS_PORT:-3000}:80"
    volumes:
      - ./nginx/docs/docs.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - docs-frontend
      - docs-api
      - docs-yprovider
    networks:
      - altiusone_network

  # ===========================================================================
  # Y-Provider (WebSocket Server pour collaboration temps réel) - Image pré-construite
  # ===========================================================================
  docs-yprovider:
    image: lasuite/impress-y-provider:latest
    container_name: altiusone_docs_yprovider
    restart: unless-stopped
    user: "1000"
    environment:
      PORT: 4444
      API_URL: http://docs-api:8000
      COLLABORATION_LOGGING: "true"
    ports:
      - "${DOCS_WS_PORT:-4444}:4444"
    depends_on:
      - docs-api
    networks:
      - altiusone_network

# ===========================================================================
# Volumes additionnels
# ===========================================================================
volumes:
  docs_postgres_data:
    driver: local
  minio_data:
    driver: local
  docs_media:
    driver: local

# Le réseau est défini dans docker-compose.yml principal
# Note: On ne déclare pas external: true car le nom du réseau varie selon le répertoire
# En local (apps/): apps_altiusone_network
# En production (/opt/altiusone/): altiusone_altiusone_network
# Docker compose merge les networks automatiquement
networks:
  altiusone_network:
