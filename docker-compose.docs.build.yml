# =============================================================================
# Docker Compose - Docs BUILD (La Suite Numérique)
# =============================================================================
# Ce fichier sert UNIQUEMENT à construire les images Docker.
# NE PAS utiliser en production - utiliser docker-compose.docs.yml à la place.
#
# Usage pour builder et pusher:
#   docker compose -f docker-compose.docs.build.yml build
#   docker compose -f docker-compose.docs.build.yml push
#
# Ou avec le script:
#   ./scripts/build-docs-images.sh
# =============================================================================

services:
  # ===========================================================================
  # Docs Backend (Django REST Framework)
  # ===========================================================================
  docs-api:
    build:
      context: ./docs-suite
      dockerfile: Dockerfile
      target: backend-production
      args:
        DOCKER_USER: "1000"
    image: apps-docs-api:latest

  # ===========================================================================
  # Docs Frontend (Next.js via Nginx)
  # ===========================================================================
  docs-frontend:
    build:
      context: ./docs-suite
      dockerfile: ./src/frontend/Dockerfile
      target: frontend-production
      args:
        DOCKER_USER: "1000"
        # URL vide = utilise le même hôte (relatif), le proxy Nginx route /api/ vers le backend
        API_ORIGIN: ""
    image: apps-docs-frontend:latest

  # ===========================================================================
  # Y-Provider (WebSocket Server)
  # ===========================================================================
  docs-yprovider:
    build:
      context: ./docs-suite
      dockerfile: ./src/frontend/servers/y-provider/Dockerfile
      target: y-provider
      args:
        DOCKER_USER: "1000"
    image: apps-docs-yprovider:latest
