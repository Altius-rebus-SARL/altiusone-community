# =============================================================================
# GitHub Actions - Build et Push des images AltiusOne
# =============================================================================
# Build les 3 images Docker (django, postgres, nextcloud) et push vers ghcr.io.
# Les instances font ensuite `docker pull` au lieu de `docker build` (~30s vs 1h30).
#
# Déclenché par:
# - Push sur main (construit :latest)
# - Push d'un tag v*.*.* (construit :version + :latest)
# - Manuellement via workflow_dispatch
# =============================================================================

name: Build AltiusOne Images

on:
  push:
    branches:
      - main
    paths:
      - 'Dockerfile'
      - 'Dockerfile.postgres'
      - 'Dockerfile.nextcloud'
      - 'requirements.txt'
      - 'entrypoint.sh'
      - '.github/workflows/build-images.yml'
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., 1.0.0)'
        required: false
        default: 'latest'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/altiusone

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="latest"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      # =========================================================================
      # Build altiusone-django (le gros: torch + sentence-transformers + embedding model)
      # =========================================================================
      - name: Build and push altiusone-django
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-django:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-django:latest
          cache-from: type=gha,scope=django
          cache-to: type=gha,mode=max,scope=django

      # =========================================================================
      # Build altiusone-postgres (PostGIS + pgvector)
      # =========================================================================
      - name: Build and push altiusone-postgres
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.postgres
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-postgres:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-postgres:latest
          cache-from: type=gha,scope=postgres
          cache-to: type=gha,mode=max,scope=postgres

      # =========================================================================
      # Build altiusone-nextcloud
      # =========================================================================
      - name: Build and push altiusone-nextcloud
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.nextcloud
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-nextcloud:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-nextcloud:latest
          cache-from: type=gha,scope=nextcloud
          cache-to: type=gha,mode=max,scope=nextcloud

      - name: Summary
        run: |
          echo "## AltiusOne Images Built" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Tag |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| django | \`${{ steps.version.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| postgres | \`${{ steps.version.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| nextcloud | \`${{ steps.version.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Registry:** \`${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}\`" >> $GITHUB_STEP_SUMMARY
