# =============================================================================
# GitHub Actions - Validate + Build et Push des images AltiusOne
# =============================================================================
# 1. Validate: vérifie que Django démarre (check, migrations, imports)
# 2. Build: construit les 3 images Docker et push vers ghcr.io
#
# Workflow git :
# - develop : branche de développement (build :dev, jamais déployé auto)
# - main    : branche stable (build :latest, déployé via Portal Ansible)
# - tags    : releases versionnées (build :version + :latest)
#
# Pour merger develop → main : créer une PR sur GitHub
# =============================================================================

name: Build AltiusOne Images

on:
  push:
    branches:
      - main
    paths:
      - '**/*.py'
      - '**/*.html'
      - 'Dockerfile'
      - 'Dockerfile.postgres'
      - 'Dockerfile.nextcloud'
      - 'requirements.txt'
      - 'entrypoint.sh'
      - 'docker-compose.yml'
      - '.github/workflows/build-images.yml'
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., 1.0.0)'
        required: false
        default: 'latest'

env:
  REGISTRY: ghcr.io

jobs:
  # =========================================================================
  # VALIDATE — Django system checks + migration consistency
  # TODO: fixer les dépendances système (CMake, GDAL) puis réactiver
  # =========================================================================
  validate:
    if: false  # désactivé temporairement
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:15-3.4
        env:
          POSTGRES_DB: altiusone_test
          POSTGRES_USER: altiusone
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -yq --no-install-recommends \
            libgdal-dev gdal-bin libgeos-dev libproj-dev \
            tesseract-ocr

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt

      - name: Enable PostGIS + pgvector
        env:
          PGPASSWORD: testpassword
        run: |
          psql -h localhost -U altiusone -d altiusone_test -c "CREATE EXTENSION IF NOT EXISTS postgis;"
          psql -h localhost -U altiusone -d altiusone_test -c "CREATE EXTENSION IF NOT EXISTS vector;"

      - name: Django system check
        env:
          DATABASE_URL: postgis://altiusone:testpassword@localhost:5432/altiusone_test
          SECRET_KEY: ci-test-secret-key-not-for-production
          DJANGO_SETTINGS_MODULE: AltiusOne.settings
          ALLOWED_HOSTS: '*'
          DEBUG: 'True'
          REDIS_URL: redis://localhost:6379/0
          MINIO_ENDPOINT: localhost:9000
          MINIO_ACCESS_KEY: test
          MINIO_SECRET_KEY: test
          MINIO_BUCKET: test
          MINIO_SECURE: 'False'
        run: |
          echo "--- Django check ---"
          python manage.py check --deploy 2>&1 | grep -v "^WARNINGS" | grep -v "^\?" || true

          echo "--- Migration consistency ---"
          python manage.py migrate --check --no-input 2>&1 && echo "✓ No pending migrations" || {
            echo "✗ Migration issues detected"
            python manage.py showmigrations --list 2>&1 | grep "\[ \]" || true
            exit 1
          }

          echo "--- Migrate (test DB) ---"
          python manage.py migrate --no-input

          echo "--- Verify all URLs load ---"
          python -c "
          import django; django.setup()
          from django.urls import reverse, get_resolver
          resolver = get_resolver()
          print(f'✓ {len(resolver.url_patterns)} URL patterns loaded')
          "

          echo "--- Verify all models import ---"
          python -c "
          import django; django.setup()
          from django.apps import apps
          models = apps.get_models()
          print(f'✓ {len(models)} models loaded')
          "

      - name: Validation Summary
        if: success()
        run: echo "✅ Django validation passed" >> $GITHUB_STEP_SUMMARY

      - name: Validation Failed
        if: failure()
        run: echo "❌ Django validation FAILED — images NOT pushed" >> $GITHUB_STEP_SUMMARY

  # =========================================================================
  # BUILD + PUSH — Only if validation passes
  # =========================================================================
  build-and-push:
    # TODO: remettre needs: validate quand le job validate aura les bonnes libs système
    # needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version and image prefix
        id: version
        run: |
          # Version : latest pour main, version pour tags
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="latest"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Image prefix (GHCR exige lowercase)
          OWNER="${{ github.repository_owner }}"
          OWNER_LC=$(echo "$OWNER" | tr '[:upper:]' '[:lower:]')
          echo "prefix=${OWNER_LC}/altiusone" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION — prefix: ${OWNER_LC}/altiusone"

      # =========================================================================
      # Build altiusone-django (le gros: torch + sentence-transformers + embedding model)
      # =========================================================================
      - name: Build and push altiusone-django
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.version.outputs.prefix }}-django:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ steps.version.outputs.prefix }}-django:latest
          cache-from: type=gha,scope=django
          cache-to: type=gha,mode=max,scope=django

      # =========================================================================
      # Build altiusone-postgres (PostGIS + pgvector)
      # =========================================================================
      - name: Build and push altiusone-postgres
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.postgres
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.version.outputs.prefix }}-postgres:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ steps.version.outputs.prefix }}-postgres:latest
          cache-from: type=gha,scope=postgres
          cache-to: type=gha,mode=max,scope=postgres

      # =========================================================================
      # Build altiusone-nextcloud
      # =========================================================================
      - name: Build and push altiusone-nextcloud
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.nextcloud
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.version.outputs.prefix }}-nextcloud:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ steps.version.outputs.prefix }}-nextcloud:latest
          cache-from: type=gha,scope=nextcloud
          cache-to: type=gha,mode=max,scope=nextcloud

      - name: Summary
        run: |
          echo "## AltiusOne Images Built" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Tag |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| django | \`${{ steps.version.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| postgres | \`${{ steps.version.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| nextcloud | \`${{ steps.version.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Registry:** \`${{ env.REGISTRY }}/${{ steps.version.outputs.prefix }}\`" >> $GITHUB_STEP_SUMMARY
