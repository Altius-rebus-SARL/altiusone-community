# =============================================================================
# GitHub Actions - Validate + Build et Push des images AltiusOne
# =============================================================================
# 1. Build: construit les 3 images Docker
# 2. Validate: verifie que Django demarre dans l'image buildee
# 3. Push: pousse les images validees vers ghcr.io
#
# Workflow git :
# - develop : branche de developpement (pas de build auto)
# - main    : branche stable (build :latest, deploye via Portal Ansible)
# - tags    : releases versionnees (build :version + :latest)
#
# Pour merger develop → main : creer une PR sur GitHub
# =============================================================================

name: Build AltiusOne Images

on:
  push:
    branches:
      - main
    paths:
      - '**/*.py'
      - '**/*.html'
      - 'Dockerfile'
      - 'Dockerfile.postgres'
      - 'Dockerfile.nextcloud'
      - 'requirements.txt'
      - 'entrypoint.sh'
      - 'docker-compose.yml'
      - '.github/workflows/build-images.yml'
      - 'VERSION'
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., 1.0.0)'
        required: false
        default: 'latest'

env:
  REGISTRY: ghcr.io

jobs:
  build-validate-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    services:
      postgres:
        image: postgis/postgis:15-3.4
        env:
          POSTGRES_DB: altiusone_test
          POSTGRES_USER: altiusone
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version and image prefix
        id: version
        run: |
          # Lire la version depuis le fichier VERSION
          FILE_VERSION=$(cat VERSION 2>/dev/null || echo "0.0.0")

          # Priorite: tag git > workflow_dispatch > fichier VERSION
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="$FILE_VERSION"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Image prefix (GHCR exige lowercase)
          OWNER="${{ github.repository_owner }}"
          OWNER_LC=$(echo "$OWNER" | tr '[:upper:]' '[:lower:]')
          echo "prefix=${OWNER_LC}/altiusone" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION — prefix: ${OWNER_LC}/altiusone"

      # =========================================================================
      # Build altiusone-django (le gros: torch + sentence-transformers + embedding model)
      # =========================================================================
      - name: Build and push altiusone-django
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            ALTIUSONE_VERSION=${{ steps.version.outputs.version }}
          tags: |
            ${{ env.REGISTRY }}/${{ steps.version.outputs.prefix }}-django:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ steps.version.outputs.prefix }}-django:latest
          cache-from: type=gha,scope=django
          cache-to: type=gha,mode=max,scope=django

      # =========================================================================
      # VALIDATE — Smoke test dans l'image buildee
      # Utilise l'image qu'on vient de construire, donc GDAL, Tesseract,
      # tous les packages Python sont deja installes. Plus de probleme de deps.
      # =========================================================================
      - name: Validate Django starts correctly
        env:
          DATABASE_URL: postgis://altiusone:testpassword@172.17.0.1:5432/altiusone_test
          SECRET_KEY: ci-test-secret-key-not-for-production
          ALLOWED_HOSTS: '*'
          DEBUG: 'True'
          REDIS_URL: redis://localhost:6379/0
          MINIO_ENDPOINT: localhost:9000
          MINIO_ACCESS_KEY: test
          MINIO_SECRET_KEY: test
          MINIO_BUCKET: test
          MINIO_SECURE: 'False'
        run: |
          echo "--- Validating Django in built image ---"
          docker run --rm --network host \
            -e DATABASE_URL="$DATABASE_URL" \
            -e SECRET_KEY="$SECRET_KEY" \
            -e ALLOWED_HOSTS="$ALLOWED_HOSTS" \
            -e DEBUG="$DEBUG" \
            -e REDIS_URL="$REDIS_URL" \
            -e MINIO_ENDPOINT="$MINIO_ENDPOINT" \
            -e MINIO_ACCESS_KEY="$MINIO_ACCESS_KEY" \
            -e MINIO_SECRET_KEY="$MINIO_SECRET_KEY" \
            -e MINIO_BUCKET="$MINIO_BUCKET" \
            -e MINIO_SECURE="$MINIO_SECURE" \
            ${{ env.REGISTRY }}/${{ steps.version.outputs.prefix }}-django:${{ steps.version.outputs.version }} \
            bash -c "
              echo '--- Django system check ---'
              python manage.py check 2>&1

              echo '--- Verify all models import ---'
              python -c '
          import django; django.setup()
          from django.apps import apps
          models = apps.get_models()
          print(f\"Models loaded: {len(models)}\")
          '

              echo '--- Verify all URL patterns load ---'
              python -c '
          import django; django.setup()
          from django.urls import get_resolver
          resolver = get_resolver()
          print(f\"URL patterns: {len(resolver.url_patterns)}\")
          '

              echo '--- Verify version ---'
              python -c '
          import django; django.setup()
          from django.conf import settings
          print(f\"Version: {settings.ALTIUSONE_VERSION}\")
          '

              echo '--- All validations passed ---'
            "

      - name: Validation passed
        if: success()
        run: echo "✅ Django validation passed in built image" >> $GITHUB_STEP_SUMMARY

      - name: Validation FAILED — image already pushed but broken
        if: failure()
        run: |
          echo "❌ Django validation FAILED — image may be broken!" >> $GITHUB_STEP_SUMMARY
          echo "::error::Django validation failed. The image was already pushed but may not start correctly."

      # =========================================================================
      # Build altiusone-postgres (PostGIS + pgvector)
      # =========================================================================
      - name: Build and push altiusone-postgres
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.postgres
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.version.outputs.prefix }}-postgres:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ steps.version.outputs.prefix }}-postgres:latest
          cache-from: type=gha,scope=postgres
          cache-to: type=gha,mode=max,scope=postgres

      # =========================================================================
      # Build altiusone-nextcloud
      # =========================================================================
      - name: Build and push altiusone-nextcloud
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.nextcloud
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.version.outputs.prefix }}-nextcloud:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ steps.version.outputs.prefix }}-nextcloud:latest
          cache-from: type=gha,scope=nextcloud
          cache-to: type=gha,mode=max,scope=nextcloud

      - name: Summary
        run: |
          echo "## AltiusOne Images Built" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Tag |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| django | \`${{ steps.version.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| postgres | \`${{ steps.version.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| nextcloud | \`${{ steps.version.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Registry:** \`${{ env.REGISTRY }}/${{ steps.version.outputs.prefix }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${{ steps.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
