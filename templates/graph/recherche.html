{% extends "base.html" %}
{% load static %}
{% load i18n %}

{% block title %}AltiusOne | {% trans "Recherche sémantique" %}{% endblock %}

{% block content %}
<ul class="app-line-breadcrumbs mb-3">
    <li>
        <a class="f-s-14 f-w-500" href="{% url 'core:dashboard' %}">
            <span><i class="ph-duotone ph-house f-s-16"></i> {% trans "Dashboard" %}</span>
        </a>
    </li>
    <li>
        <a class="f-s-14 f-w-500" href="{% url 'graph:explorer' %}">
            <span><i class="ph-duotone ph-graph f-s-16"></i> {% trans "Graphe" %}</span>
        </a>
    </li>
    <li class="active">{% trans "Recherche" %}</li>
</ul>

<div class="card mb-3">
    <div class="card-body">
        <div class="row align-items-end">
            <div class="col-md-6">
                <label class="form-label">{% trans "Recherche sémantique" %}</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="ph ph-magnifying-glass"></i></span>
                    <input type="text" id="searchQuery" class="form-control form-control-lg"
                           placeholder="{% trans 'Décrivez ce que vous cherchez...' %}" autocomplete="off">
                </div>
            </div>
            <div class="col-md-3">
                <label class="form-label">{% trans "Filtrer par type" %}</label>
                <select id="filterTypeRecherche" class="form-select">
                    <option value="">{% trans "Tous les types" %}</option>
                    {% for t in types_entites %}
                    <option value="{{ t.pk }}">{{ t.nom }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-3">
                <button id="btnRecherche" class="btn btn-primary w-100">
                    <i class="ph ph-magnifying-glass me-1"></i> {% trans "Rechercher" %}
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Results -->
<div id="searchResultsContainer" style="display: none;">
    <div class="d-flex justify-content-between align-items-center mb-2">
        <h6 class="mb-0">
            <i class="ph ph-list me-2"></i>{% trans "Résultats" %}
            <span id="resultCount" class="badge bg-light-primary text-primary ms-1">0</span>
        </h6>
    </div>
    <div id="resultsList"></div>
</div>

<!-- Loading -->
<div id="searchLoading" class="text-center py-5" style="display: none;">
    <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Loading...</span>
    </div>
</div>

<script>
    window.GRAPH_CONFIG = {
        apiBase: '/api/v1/',
        csrfToken: '{{ csrf_token }}',
    };
</script>
<script src="{% static 'graph/js/recherche.js' %}"></script>
{% endblock %}
