<!-- modelforms/partials/builder_section_form.html -->
{% load i18n %}

<form {% if is_edit %}
        hx-post="{% url 'modelforms:builder-edit-section' configuration.pk section.id %}"
      {% else %}
        hx-post="{% url 'modelforms:builder-add-section' configuration.pk %}"
      {% endif %}
      hx-target="#builder-sections-panel"
      hx-swap="innerHTML">
    {% csrf_token %}
    <div class="row g-2 align-items-end">
        <div class="col">
            <label class="form-label f-s-12">{% trans "Titre" %}</label>
            <input type="text" name="title" class="form-control form-control-sm"
                   placeholder="{% trans 'Ex: Identité, Contact...' %}"
                   value="{% if section %}{{ section.title }}{% endif %}"
                   required>
        </div>
        <div class="col-auto">
            <label class="form-label f-s-12">{% trans "Icône" %}</label>
            <input type="text" name="icon" class="form-control form-control-sm"
                   placeholder="ph-duotone ph-user"
                   value="{% if section.icon %}{{ section.icon }}{% endif %}"
                   style="width: 160px;">
        </div>
        <div class="col-auto">
            <button type="submit" class="btn btn-sm btn-primary">
                {% if is_edit %}
                    <i class="ti ti-check me-1"></i>{% trans "Modifier" %}
                {% else %}
                    <i class="ti ti-plus me-1"></i>{% trans "Créer" %}
                {% endif %}
            </button>
        </div>
    </div>
</form>
