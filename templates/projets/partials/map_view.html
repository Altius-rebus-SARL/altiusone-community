{% load i18n %}

<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="text-primary mb-0">
            <i class="ti ti-map-pin me-2"></i>{% trans "Carte" %}
        </h5>
        <div>
            <span class="badge bg-light-primary me-1"><i class="ti ti-circle-filled f-s-8 me-1"></i>{% trans "Position" %}</span>
            <span class="badge bg-light-secondary"><i class="ti ti-circle f-s-8 me-1"></i>{% trans "Opération" %}</span>
        </div>
    </div>
    <div class="card-body p-0">
        <div id="projectMap" style="height:500px; border-radius:0 0 .5rem .5rem;"></div>
        <div id="mapEmpty" class="text-center py-5 text-muted" style="display:none">
            <i class="ti ti-map-pin-off f-s-40 mb-2 d-block"></i>
            {% trans "Aucune position géolocalisée. Ajoutez des adresses aux positions et opérations pour les voir sur la carte." %}
        </div>
    </div>
</div>

<script>
(function() {
    const dataUrl = '{% url "projets:map-data" mandat.pk %}';

    // Couleurs par statut
    const statutColors = {
        'PLANIFIE': '#95a5a6',
        'EN_COURS': '#2980b9',
        'TERMINE': '#27ae60',
        'ANNULE': '#c0392b',
        'A_FAIRE': '#95a5a6',
        'EN_ATTENTE': '#f39c12',
        'TERMINEE': '#27ae60',
        'ANNULEE': '#c0392b',
    };

    fetch(dataUrl, { headers: {'X-Requested-With': 'XMLHttpRequest'} })
    .then(r => r.json())
    .then(geojson => {
        if (!geojson.features || geojson.features.length === 0) {
            document.getElementById('projectMap').style.display = 'none';
            document.getElementById('mapEmpty').style.display = '';
            return;
        }

        // Destroy previous instance if HTMX re-swapped
        const mapEl = document.getElementById('projectMap');
        if (mapEl._leaflet_id) {
            mapEl._leaflet_id = null;
            mapEl.innerHTML = '';
        }

        // Centrer sur la Suisse par défaut
        const map = L.map('projectMap').setView([46.8, 8.2], 8);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors',
            maxZoom: 19,
        }).addTo(map);

        const markers = L.markerClusterGroup();
        const bounds = [];

        geojson.features.forEach(function(feature) {
            const coords = feature.geometry.coordinates;
            const props = feature.properties;
            const color = statutColors[props.statut] || '#95a5a6';
            const isPosition = props.type === 'position';
            const radius = isPosition ? 10 : 6;

            const marker = L.circleMarker([coords[1], coords[0]], {
                radius: radius,
                fillColor: color,
                color: isPosition ? '#2c3e50' : color,
                weight: isPosition ? 2 : 1,
                opacity: 1,
                fillOpacity: isPosition ? 0.9 : 0.7,
            });

            // Popup
            let popup = '<div style="min-width:150px">';
            popup += '<strong>' + props.titre + '</strong>';
            popup += '<br><small class="text-muted">' + props.numero + '</small>';
            popup += '<br><span class="badge" style="background:' + color + ';color:#fff">' + props.statut + '</span>';
            if (props.budget_prevu) {
                popup += '<br><small>Budget: ' + Number(props.budget_prevu).toLocaleString('fr-CH') + ' CHF</small>';
            }
            if (props.progression !== undefined) {
                popup += '<br><small>Progression: ' + props.progression + '%</small>';
            }
            if (props.position_titre) {
                popup += '<br><small>Position: ' + props.position_titre + '</small>';
            }
            popup += '</div>';
            marker.bindPopup(popup);

            markers.addLayer(marker);
            bounds.push([coords[1], coords[0]]);
        });

        map.addLayer(markers);

        if (bounds.length > 0) {
            map.fitBounds(bounds, { padding: [30, 30] });
        }
    });
})();
</script>
