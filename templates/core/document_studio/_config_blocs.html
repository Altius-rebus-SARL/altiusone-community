{% load i18n %}

<div class="card mb-3">
    <div class="card-header py-2">
        <h6 class="mb-0">
            <i class="ph-duotone ph-toggle-left me-1"></i>
            {% trans "Blocs visibles" %}
        </h6>
    </div>
    <div class="card-body py-2" id="studio-blocs-container">
        {% for bloc_key, bloc_label in blocs_config %}
        <div class="form-check form-switch mb-1">
            <input type="checkbox" class="form-check-input"
                   id="studio-bloc-{{ bloc_key }}"
                   data-studio-bloc="{{ bloc_key }}"
                   {% if config.blocs_visibles|default:True %}checked{% endif %}>
            <label class="form-check-label small" for="studio-bloc-{{ bloc_key }}">
                {{ bloc_label }}
            </label>
        </div>
        {% endfor %}
    </div>
</div>
