{% load i18n %}

<div class="card mb-3">
    <div class="card-header py-2">
        <h6 class="mb-0">
            <i class="ph-duotone ph-text-align-left me-1"></i>
            {% trans "Textes" %}
        </h6>
    </div>
    <div class="card-body py-2">
        <div class="mb-2">
            <label class="form-label">{% trans "En-tête" %}</label>
            <textarea class="form-control form-control-sm" rows="2"
                      data-studio-texte="entete"
                      placeholder="{% trans 'Texte affiché dans l\'en-tête du document' %}">{{ config.textes.entete|default:"" }}</textarea>
        </div>
        <div class="mb-2">
            <label class="form-label">{% trans "Pied de page" %}</label>
            <textarea class="form-control form-control-sm" rows="2"
                      data-studio-texte="pied_page"
                      placeholder="{% trans 'Texte affiché en bas de chaque page' %}">{{ config.textes.pied_page|default:"" }}</textarea>
        </div>
        <div class="mb-2">
            <label class="form-label">{% trans "Introduction" %}</label>
            <textarea class="form-control form-control-sm" rows="2"
                      data-studio-texte="introduction"
                      placeholder="{% trans 'Texte d\'introduction du document' %}">{{ config.textes.introduction|default:"" }}</textarea>
        </div>
        <div class="mb-2">
            <label class="form-label">{% trans "Conclusion" %}</label>
            <textarea class="form-control form-control-sm" rows="2"
                      data-studio-texte="conclusion"
                      placeholder="{% trans 'Texte de conclusion/remerciements' %}">{{ config.textes.conclusion|default:"" }}</textarea>
        </div>
    </div>
</div>
