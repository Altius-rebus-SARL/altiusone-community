{% load i18n %}

<div class="card mb-3">
    <div class="card-header py-2">
        <h6 class="mb-0">
            <i class="ph-duotone ph-text-aa me-1"></i>
            {% trans "Police" %}
        </h6>
    </div>
    <div class="card-body py-2">
        <select class="form-select form-select-sm" data-studio-field="police">
            <option value="Helvetica" {% if config.police == 'Helvetica' or not config.police %}selected{% endif %}>Helvetica</option>
            <option value="Times-Roman" {% if config.police == 'Times-Roman' %}selected{% endif %}>Times Roman</option>
            <option value="Courier" {% if config.police == 'Courier' %}selected{% endif %}>Courier</option>
        </select>
    </div>
</div>
