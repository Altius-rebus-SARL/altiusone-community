{% load i18n %}

<div class="card mb-3">
    <div class="card-header py-2">
        <h6 class="mb-0">
            <i class="ph-duotone ph-frame-corners me-1"></i>
            {% trans "Marges (mm)" %}
        </h6>
    </div>
    <div class="card-body py-2">
        <div class="row g-2">
            <div class="col-6">
                <label class="form-label">{% trans "Haut" %}</label>
                <input type="number" class="form-control form-control-sm"
                       value="{{ config.marge_haut|default:20 }}" min="5" max="50"
                       data-studio-field="marge_haut" data-studio-type="number">
            </div>
            <div class="col-6">
                <label class="form-label">{% trans "Bas" %}</label>
                <input type="number" class="form-control form-control-sm"
                       value="{{ config.marge_bas|default:25 }}" min="5" max="50"
                       data-studio-field="marge_bas" data-studio-type="number">
            </div>
            <div class="col-6">
                <label class="form-label">{% trans "Gauche" %}</label>
                <input type="number" class="form-control form-control-sm"
                       value="{{ config.marge_gauche|default:20 }}" min="5" max="50"
                       data-studio-field="marge_gauche" data-studio-type="number">
            </div>
            <div class="col-6">
                <label class="form-label">{% trans "Droite" %}</label>
                <input type="number" class="form-control form-control-sm"
                       value="{{ config.marge_droite|default:15 }}" min="5" max="50"
                       data-studio-field="marge_droite" data-studio-type="number">
            </div>
        </div>
    </div>
</div>
