{% load i18n %}

<div class="card mb-3">
    <div class="card-header py-2">
        <h6 class="mb-0">
            <i class="ph-duotone ph-palette me-1"></i>
            {% trans "Couleurs" %}
        </h6>
    </div>
    <div class="card-body py-2">
        <div class="mb-2">
            <label class="form-label">{% trans "Primaire" %}</label>
            <div class="studio-color-group">
                <input type="color" value="{{ config.couleur_primaire|default:'#088178' }}"
                       data-studio-field="couleur_primaire">
                <input type="text" class="form-control form-control-sm"
                       value="{{ config.couleur_primaire|default:'#088178' }}"
                       data-studio-field="couleur_primaire">
            </div>
        </div>
        <div class="mb-2">
            <label class="form-label">{% trans "Accent" %}</label>
            <div class="studio-color-group">
                <input type="color" value="{{ config.couleur_accent|default:'#2c3e50' }}"
                       data-studio-field="couleur_accent">
                <input type="text" class="form-control form-control-sm"
                       value="{{ config.couleur_accent|default:'#2c3e50' }}"
                       data-studio-field="couleur_accent">
            </div>
        </div>
        <div class="mb-2">
            <label class="form-label">{% trans "Texte" %}</label>
            <div class="studio-color-group">
                <input type="color" value="{{ config.couleur_texte|default:'#333333' }}"
                       data-studio-field="couleur_texte">
                <input type="text" class="form-control form-control-sm"
                       value="{{ config.couleur_texte|default:'#333333' }}"
                       data-studio-field="couleur_texte">
            </div>
        </div>
    </div>
</div>
