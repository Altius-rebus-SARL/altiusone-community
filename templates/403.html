{% load static %}
{% load i18n %}
<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE|default:'fr' }}">
  <head>
    <meta charset="UTF-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>{% trans "Accès interdit" %} | AltiusOne</title>
    <link href="{% static 'assets/images/logo/favicon.png' %}" rel="icon" type="image/x-icon" />
    <link href="{% static 'assets/vendor/bootstrap/bootstrap.min.css' %}" rel="stylesheet" />
    <link href="{% static 'assets/vendor/tabler-icons/tabler-icons.css' %}" rel="stylesheet" />
    <link href="{% static 'assets/css/style.css' %}" rel="stylesheet" />
    <style>
      .error-page {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #f5f7fa 0%, #e4e9f0 100%);
      }
      .error-card {
        text-align: center;
        max-width: 480px;
        padding: 3rem 2rem;
      }
      .error-code {
        font-size: 7rem;
        font-weight: 800;
        color: #c0392b;
        line-height: 1;
        margin-bottom: 0.5rem;
      }
      .error-title {
        font-size: 1.5rem;
        font-weight: 600;
        color: #2c3e50;
        margin-bottom: 1rem;
      }
      .error-message {
        color: #666;
        margin-bottom: 2rem;
        font-size: 1rem;
      }
    </style>
  </head>
  <body>
    <div class="error-page">
      <div class="error-card">
        <a href="/">
          <img src="{% static 'assets/images/logo/3.png' %}" alt="AltiusOne" style="height: 48px; margin-bottom: 2rem;" />
        </a>
        <div class="error-code">403</div>
        <h1 class="error-title">{% trans "Accès interdit" %}</h1>
        <p class="error-message">{% trans "Vous n'avez pas les permissions nécessaires pour accéder à cette page." %}</p>
        <div class="d-flex gap-2 justify-content-center">
          <a href="javascript:history.back()" class="btn btn-outline-secondary px-4">
            <i class="ti ti-arrow-left me-1"></i> {% trans "Retour" %}
          </a>
          <a href="/" class="btn btn-primary px-4">
            <i class="ti ti-home me-1"></i> {% trans "Accueil" %}
          </a>
        </div>
      </div>
    </div>
  </body>
</html>
