{% load i18n %}
<div class="card chart-card h-100">
    <div class="card-header d-flex justify-content-between align-items-center">
        <div>
            <h5 class="mb-0">{% trans "Activité Annuelle" %}</h5>
            <small class="text-muted">{% trans "Heatmap calendrier — intensité par jour" %}</small>
        </div>
        <div class="d-flex gap-2">
            <button class="d3-metric-btn active" data-metric="factures">{% trans "Factures" %}</button>
            <button class="d3-metric-btn" data-metric="heures">{% trans "Heures" %}</button>
            <button class="d3-metric-btn" data-metric="paiements">{% trans "Paiements" %}</button>
        </div>
    </div>
    <div class="card-body">
        <div id="calendar-container" class="d3-chart-container" style="height: 180px;"></div>
        <div class="calendar-legend"></div>
    </div>
</div>
